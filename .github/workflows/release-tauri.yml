name: release-tauri

on:
  push:
    tags:
      - 'tauri-v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/client-tauri/src-tauri -> target

      - name: install linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend deps
        working-directory: apps/client-tauri
        run: npm ci

      - name: generate icons
        working-directory: apps/client-tauri
        run: node scripts/generate-icons.mjs

      - name: write vite env
        # apps/client/.env.local-server гитигнорится, поэтому в CI его нет —
        # vite.config.ts фолбэкается на http://localhost:3000 и установленный
        # клиент не находит lobby. Создаём env-файл прямо здесь.
        shell: bash
        working-directory: apps/client-tauri
        env:
          VITE_LOBBY_URL: ${{ vars.VITE_LOBBY_URL || 'https://app.voicechat-xyz.ru' }}
        run: |
          printf 'VITE_LOBBY_URL=%s\n' "$VITE_LOBBY_URL" > .env.local-server

      - name: build & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/client-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'VoiceChat (Tauri) v__VERSION__'
          releaseBody: 'Автосборка Tauri-клиента. См. ассеты для установки.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
