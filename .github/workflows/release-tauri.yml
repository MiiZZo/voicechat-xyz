name: release-tauri

on:
  push:
    tags:
      - 'tauri-v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/client-tauri/src-tauri -> target

      - name: install linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend deps
        working-directory: apps/client-tauri
        run: npm ci

      - name: generate icons
        working-directory: apps/client-tauri
        run: node scripts/generate-icons.mjs

      - name: write vite env
        # apps/client/.env.local-server гитигнорится, поэтому в CI его нет.
        # Создаём env-файл явно. Дефолт vite.config.ts тоже указывает на prod
        # (см. соответствующий коммит) — этот шаг страхует на случай, когда
        # нужно собрать на staging-URL через repo variable VITE_LOBBY_URL.
        shell: bash
        working-directory: apps/client-tauri
        env:
          VITE_LOBBY_URL: ${{ vars.VITE_LOBBY_URL || 'https://app.voicechat-xyz.ru' }}
        run: |
          printf 'VITE_LOBBY_URL=%s\n' "$VITE_LOBBY_URL" > .env.local-server
          echo "--- .env.local-server ---"
          cat .env.local-server
          echo "--- .env.* listing ---"
          ls -la .env* || true

      - name: build & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/client-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'VoiceChat (Tauri) v__VERSION__'
          releaseBody: 'Автосборка Tauri-клиента. См. ассеты для установки.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: assert lobby URL is baked into bundle
        # Защита от регрессии env-проброса: если в собранном dist/*.js остался
        # дефолтный localhost-URL — значит env не подхватился, и установщик
        # выйдет нерабочим. Лучше упасть в CI, чем выпустить мёртвый релиз.
        shell: bash
        working-directory: apps/client-tauri
        env:
          EXPECTED_URL: ${{ vars.VITE_LOBBY_URL || 'https://app.voicechat-xyz.ru' }}
        run: |
          set -e
          if [ ! -d dist ]; then
            echo "::error::dist/ not found — vite build did not run"
            exit 1
          fi
          if grep -r --include='*.js' -F 'http://localhost:3000' dist/ ; then
            echo "::error::localhost:3000 found in built bundle — env was not applied"
            exit 1
          fi
          if ! grep -r --include='*.js' -F "$EXPECTED_URL" dist/ > /dev/null; then
            echo "::error::expected URL ($EXPECTED_URL) NOT found in bundle"
            exit 1
          fi
          echo "OK: $EXPECTED_URL is baked into bundle"
