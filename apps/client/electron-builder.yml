appId: com.example.voicechat
productName: VoiceChat
directories:
  output: release/${version}
files:
  - out/**
  - package.json
win:
  target: nsis
  artifactName: ${productName}-${version}-Setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
publish:
  provider: github
  owner: REPLACE_ME
  repo: voicechat
